<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urban Fury Mobile v3</title>
<style>
:root {
    --hud-height: 170px;
    --fighter-width: 74px;
    --fighter-height: 130px;
}
* { box-sizing: border-box; user-select: none; }
body {
    margin: 0;
    background: radial-gradient(circle at 50% 20%, #3f4e6f, #0f1117 60%);
    font-family: "Trebuchet MS", Arial, sans-serif;
    overflow: hidden;
    color: white;
}
#game { position: relative; width: 100vw; height: 100vh; }
#arena { position: absolute; inset: 0; overflow: hidden; }
#floor {
    position: absolute;
    bottom: var(--hud-height);
    width: 100%; height: 14px;
    background: linear-gradient(90deg, #70738d, #d7dcff, #70738d);
}
.fighter {
    position: absolute;
    width: var(--fighter-width);
    height: var(--fighter-height);
    border-radius: 12px;
    border: 2px solid #ffffff77;
    transform-origin: center bottom;
}
#player { left: 80px; background: linear-gradient(to top, #2dc5db, #7ef5ff); }
#enemy { left: calc(100vw - 160px); background: linear-gradient(to top, #d73b7d, #ff8dac); }
#controls {
    position: absolute; bottom: 0; width: 100%;
    height: var(--hud-height);
    background: linear-gradient(to top, #05070fdd, #0f1520cc);
    display: flex; justify-content: space-between;
    align-items: center; padding: 0 14px;
}
button {
    width: 62px; height: 62px;
    border-radius: 50%;
    border: 2px solid #ffffff55;
    color: #fff; background: #5d6477;
}
.attack { background: #e16322; }
.special { background: #7a32dd; }
.block { background: #2470bf; }
.jump { background: #3f9f6b; }
.kick { background: #9f5026; }
</style>
</head>
<body>
<div id="game">
<div id="arena">
<div id="player" class="fighter"></div>
<div id="enemy" class="fighter"></div>
<div id="floor"></div>
</div>
<div id="controls">
<div>
<button onclick="move(-1)">◀</button>
<button class="jump" onclick="jump()">⤴</button>
<button onclick="move(1)">▶</button>
</div>
<div>
<button class="block" onpointerdown="setBlocking(true)" onpointerup="setBlocking(false)">🛡</button>
<button class="attack" onclick="attack()">👊</button>
<button class="kick" onclick="kick()">🦶</button>
<button class="special" onclick="special()">🔥</button>
</div>
</div>
</div>
<script>
const player = document.getElementById("player");
const enemy = document.getElementById("enemy");
let playerX = 80;
let enemyX = window.innerWidth - 160;
let playerBlocking = false;
function clamp(v,min,max){return Math.max(min,Math.min(max,v));}
function render(){
player.style.left=playerX+"px";
enemy.style.left=enemyX+"px";
}
function move(d){
playerX=clamp(playerX+d*24,0,window.innerWidth-84);
render();
}
function setBlocking(b){playerBlocking=b;}
function attack(){
if(Math.abs(playerX-enemyX)<120){ alert("Punch Hit!"); }
}
function kick(){
if(Math.abs(playerX-enemyX)<120){ alert("Kick Hit!"); }
}
function special(){
if(Math.abs(playerX-enemyX)<150){ alert("Fireball!"); }
}
function jump(){
player.style.transform="translateY(-120px)";
setTimeout(()=>player.style.transform="translateY(0px)",400);
}
setInterval(()=>{
if(Math.abs(playerX-enemyX)>120){
enemyX+=playerX>enemyX?10:-10;
}
render();
},500);
render();
</script>
</body>
</html>
